name: Monthly snapshot refresh

on:
  schedule:
    # 06:00 UTC on the 1st of each month
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping refreshes if a previous run is still going
concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run snapshot script
        run: npm run snapshot

      - name: Check if spaces.json changed
        id: diff
        run: |
          if git diff --quiet HEAD -- public/data/spaces.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — skipping commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected — will commit"
          fi

      - name: Commit and push via GitHub API
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current SHA of the file on main (required by the contents API for updates)
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/contents/public/data/spaces.json --jq '.sha')

          # Compose ISO date for commit message
          DATE=$(date -u +"%Y-%m-%d")

          # Build the JSON payload as a file (avoids ARG_MAX on the base64 content)
          jq -n \
            --arg message "chore: refresh spaces.json snapshot ($DATE)" \
            --arg sha "$CURRENT_SHA" \
            --arg branch "main" \
            --rawfile content_file public/data/spaces.json \
            '{
              message: $message,
              sha: $sha,
              branch: $branch,
              content: ($content_file | @base64)
            }' > /tmp/contents_payload.json

          # PUT via stdin. github-actions[bot] will be the auto-author, commit will be signed by GitHub.
          gh api \
            --method PUT \
            --input /tmp/contents_payload.json \
            repos/${{ github.repository }}/contents/public/data/spaces.json

          echo "Commit pushed via API — github-actions[bot] author, auto-signed"
